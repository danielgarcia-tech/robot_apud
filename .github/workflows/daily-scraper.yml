name: Daily ApudActa Scraper

on:
  schedule:
    # Ejecutar todos los días a las 6:00 AM UTC (7:00 AM Madrid en invierno, 8:00 AM en verano)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Permite ejecución manual desde GitHub

# 🔐 CONFIGURACIÓN DE SEGURIDAD
env:
  FORCE_COLOR: 1  # Colores en logs

jobs:
  scrape-apudacta:
    runs-on: ubuntu-latest

    # 🛡️ PERMISOS MÍNIMOS
    permissions:
      contents: read  # Solo leer código
      actions: read   # Leer actions
      # ❌ NO escribir permisos para seguridad

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright python-dotenv py7zr

    - name: 🌐 Install Playwright browsers
      run: |
        playwright install chromium

    - name: 🚀 Run ApudActa Scraper
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        echo "🌟 Iniciando scraper diario..."
        echo "📧 Usuario: $EMAIL"
        echo "🔐 Password: [PROTEGIDO]"
        python easyday.py
        echo "✅ Scraper completado"

    - name: 📁 Upload downloaded files
      uses: actions/upload-artifact@v4
      if: always()  # Subir archivos aunque haya errores
      with:
        name: apudacta-downloads-${{ github.run_number }}
        path: descargas/
        retention-days: 7  # ⚠️ SOLO 7 DÍAS para seguridad

    - name: 📧 Send daily ZIP to Daniel
      if: success()  # Solo enviar si la descarga fue exitosa
      run: |
        echo "## 📦 ApudActa - Archivo diario $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Scraper ejecutado exitosamente**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Detalles de la descarga:" >> $GITHUB_STEP_SUMMARY
        echo "- **Fecha:** $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
        echo "- **Hora:** $(date +%H:%M) UTC" >> $GITHUB_STEP_SUMMARY
        echo "- **Archivos encontrados:** $(ls descargas/ | wc -l)" >> $GITHUB_STEP_SUMMARY
        echo "- **Archivos:**" >> $GITHUB_STEP_SUMMARY
        for file in descargas/*; do
          if [ -f "$file" ]; then
            echo "  - $(basename "$file") ($(du -h "$file" | cut -f1))" >> $GITHUB_STEP_SUMMARY
          fi
        done
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔐 SEGURIDAD DEL ARCHIVO" >> $GITHUB_STEP_SUMMARY
        echo "- Los archivos están protegidos con contraseña" >> $GITHUB_STEP_SUMMARY
        echo "- **Contraseña:** Rua2025" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📁 Descargar archivos" >> $GITHUB_STEP_SUMMARY
        echo "Los archivos están disponibles en la sección **Artifacts** de esta ejecución:" >> $GITHUB_STEP_SUMMARY
        echo "- Nombre del artifact: \`apudacta-downloads-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- Link: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "🤖 *Robot ApudActa*" >> $GITHUB_STEP_SUMMARY

    - name: 🧹 Cleanup sensitive data
      if: always()
      run: |
        # Limpiar cualquier dato sensible de logs
        echo "🧹 Limpiando datos sensibles..."
        rm -rf descargas/  # Eliminar archivos locales después de subir

    - name: 📧 Send notification when no files found
      if: success() && !hashFiles('descargas/*.7z')
      run: |
        echo "## ⚠️ ApudActa - No se encontraron archivos $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "ℹ️ **El scraper se ejecutó correctamente pero no encontró archivos para descargar.**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🤔 Posibles razones:" >> $GITHUB_STEP_SUMMARY
        echo "- No hay nuevos archivos finalizados en ApudActa" >> $GITHUB_STEP_SUMMARY
        echo "- Todos los archivos ya fueron descargados anteriormente" >> $GITHUB_STEP_SUMMARY
        echo "- Problema temporal en la plataforma" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "El scraper seguirá funcionando normalmente y te notificará cuando haya archivos disponibles." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Fecha:** $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
        echo "**Hora:** $(date +%H:%M) UTC" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "🤖 *Robot ApudActa*" >> $GITHUB_STEP_SUMMARY

    - name: 📧 Send notification on failure
      if: failure()
      run: |
        echo "## ❌ Error en ApudActa Scraper - ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🚨 **Ha ocurrido un error en la ejecución del scraper de ApudActa.**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Detalles del error:" >> $GITHUB_STEP_SUMMARY
        echo "- **Fecha:** $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
        echo "- **Hora:** $(date +%H:%M) UTC" >> $GITHUB_STEP_SUMMARY
        echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔍 Posibles causas:" >> $GITHUB_STEP_SUMMARY
        echo "- Problemas de conexión con ApudActa" >> $GITHUB_STEP_SUMMARY
        echo "- Cambios en la interfaz web" >> $GITHUB_STEP_SUMMARY
        echo "- Credenciales expiradas" >> $GITHUB_STEP_SUMMARY
        echo "- Problemas temporales de red" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📖 Revisar logs:" >> $GITHUB_STEP_SUMMARY
        echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "⏰ El scraper intentará ejecutarse nuevamente mañana." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "🤖 *Robot ApudActa*" >> $GITHUB_STEP_SUMMARY
