name: ApudActa Scraper v2

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'trigger.txt'

env:
  FORCE_COLOR: 1

jobs:
  scrape-apudacta:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright python-dotenv py7zr

    - name: Install Playwright browsers
      run: |
        playwright install chromium

    - name: Run ApudActa Scraper
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        echo "Starting scraper..."
        python easyday.py
        echo "Scraper completed"

    - name: Upload downloaded files
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apudacta-downloads-${{ github.run_number }}
        path: descargas/
        retention-days: 7

    - name: Send ZIP to Webhook
      if: success()
      run: |
        echo "📤 Enviando archivos al webhook..."

        # Crear directorio temporal para los archivos
        mkdir -p webhook_files

        # Copiar archivos descargados al directorio temporal
        if [ -d "descargas" ] && [ "$(ls -A descargas)" ]; then
          cp -r descargas/* webhook_files/ 2>/dev/null || true

          # Crear archivo ZIP con todos los archivos
          cd webhook_files
          zip -r ../apudacta-files-${{ github.run_number }}.zip . 2>/dev/null || true
          cd ..

          # Enviar el ZIP al webhook usando curl
          if [ -f "apudacta-files-${{ github.run_number }}.zip" ]; then
            echo "📦 Enviando ZIP al webhook: https://justiflow.com/webhook/99305ca7-ec18-465a-b192-05f3708387b4"

            # Enviar usando curl con multipart/form-data
            curl -X POST \
              -F "file=@apudacta-files-${{ github.run_number }}.zip" \
              -F "run_id=${{ github.run_id }}" \
              -F "run_number=${{ github.run_number }}" \
              -F "date=$(date +%Y-%m-%d)" \
              -F "repository=${{ github.repository }}" \
              https://justiflow.com/webhook/99305ca7-ec18-465a-b192-05f3708387b4

            echo "✅ Archivo enviado exitosamente al webhook"
          else
            echo "⚠️ No se encontraron archivos para enviar"
          fi
        else
          echo "⚠️ No hay archivos descargados para enviar"
        fi

        # Limpiar archivos temporales
        rm -rf webhook_files apudacta-files-${{ github.run_number }}.zip

    - name: Create success notification issue
      if: success()
      run: |
        ISSUE_TITLE="ApudActa - Success $(date +%Y-%m-%d)"
        ISSUE_BODY="## Success

Scraper executed successfully.

### Download files:
- Artifact: apudacta-downloads-${{ github.run_number }}
- Link: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

Password: Rua2025

---
🤖 Robot ApudActa"

        echo "$ISSUE_BODY" | gh issue create --title "$ISSUE_TITLE" --body-file - --label "scraper-notification"

    - name: Create no files notification issue
      if: success() && !hashFiles('descargas/*.7z')
      run: |
        ISSUE_TITLE="ApudActa - No files $(date +%Y-%m-%d)"
        ISSUE_BODY="## No files found

Scraper ran but found no files to download.

---
🤖 Robot ApudActa"

        echo "$ISSUE_BODY" | gh issue create --title "$ISSUE_TITLE" --body-file - --label "scraper-notification"

    - name: Create error notification issue
      if: failure()
      run: |
        ISSUE_TITLE="ApudActa - Error ${{ github.run_number }}"
        ISSUE_BODY="## Error occurred

Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

---
🤖 Robot ApudActa"

        echo "$ISSUE_BODY" | gh issue create --title "$ISSUE_TITLE" --body-file - --label "scraper-notification"

    - name: Cleanup
      if: always()
      run: |
        rm -rf descargas/
