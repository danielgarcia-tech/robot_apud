name: ApudActa Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # Ejecutar diariamente a las 6:00 AM UTC
  workflow_dispatch:  # Permitir ejecución manual
  push:
    branches: [ main ]
    paths:
      - 'start_scraper.txt'  # Trigger manual via archivo

jobs:
  scrape_and_send:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: read
      issues: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright python-dotenv py7zr requests

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Run Scraper
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        echo "Iniciando scraper ApudActa..."
        python easyday.py
        echo "Scraper completado"

    - name: Check Downloaded Files
      id: check_files
      run: |
        if [ -d "descargas" ] && [ "$(ls -A descargas)" ]; then
          echo "FILES_FOUND=true" >> $GITHUB_OUTPUT
          echo "Archivos encontrados:"
          ls -la descargas/
        else
          echo "FILES_FOUND=false" >> $GITHUB_OUTPUT
          echo "No se encontraron archivos"
        fi

    - name: Send to Webhook
      if: steps.check_files.outputs.FILES_FOUND == 'true'
      run: |
        echo "Enviando archivos al webhook..."
        
        # Crear ZIP con todos los archivos
        cd descargas
        zip -r ../apudacta_files_$(date +%Y%m%d_%H%M%S).zip *
        cd ..
        
        # Enviar al webhook
        ZIP_FILE=$(ls apudacta_files_*.zip | head -1)
        if [ -f "$ZIP_FILE" ]; then
          echo "Enviando $ZIP_FILE a JustiFlow webhook..."
          
          curl -X POST \
            -F "file=@$ZIP_FILE" \
            -F "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -F "run_id=${{ github.run_id }}" \
            -F "source=github_actions" \
            https://justiflow.com/webhook/99305ca7-ec18-465a-b192-05f3708387b4
          
          echo "Archivo enviado exitosamente"
        else
          echo "Error: No se pudo crear el archivo ZIP"
          exit 1
        fi

    - name: Upload Artifacts (Backup)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: apudacta-files-${{ github.run_number }}
        path: descargas/
        retention-days: 7

    - name: Create Success Issue
      if: steps.check_files.outputs.FILES_FOUND == 'true'
      run: |
        gh issue create \
          --title "ApudActa Success - $(date +%Y-%m-%d)" \
          --body "Scraper ejecutado exitosamente. Archivos enviados al webhook." \
          --label "success,automated"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create No Files Issue
      if: steps.check_files.outputs.FILES_FOUND == 'false'
      run: |
        gh issue create \
          --title "ApudActa - Sin archivos - $(date +%Y-%m-%d)" \
          --body "Scraper ejecutado pero no se encontraron archivos para descargar." \
          --label "no-files,automated"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Error Issue
      if: failure()
      run: |
        gh issue create \
          --title "ApudActa Error - $(date +%Y-%m-%d)" \
          --body "Error en la ejecucion del scraper. Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          --label "error,automated"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup
      if: always()
      run: |
        rm -rf descargas/
        rm -f apudacta_files_*.zip
