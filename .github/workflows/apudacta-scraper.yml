name: ApudActa Scraper with PDF Processing

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'start_scraper.txt'

jobs:
  scrape_process_and_send:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev libmupdf-dev libfreetype6-dev libjpeg-dev libopenjp2-7-dev

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -c "import fitz; print('PyMuPDF instalado correctamente:', fitz.version)"

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Run ApudActa Scraper
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        echo "Iniciando ApudActa Scraper con procesamiento PDF..."
        mkdir -p descargas
        timeout 25m python easyday.py || exit 1

    - name: Create Certificates ZIP
      id: create_zip
      run: |
        echo "Creando ZIP con poderes completos..."
        if [ -d "procesados/PODERES" ] && [ "$(ls -A procesados/PODERES)" ]; then
          zip -r poderes.zip procesados/PODERES/
          echo "ZIP_CREATED=true" >> $GITHUB_OUTPUT
          echo "ZIP_FILE=poderes.zip" >> $GITHUB_OUTPUT
        else
          echo "No se encontraron poderes"
          echo "ZIP_CREATED=false" >> $GITHUB_OUTPUT
        fi

    - name: Check Downloaded Files
      id: check_files
      run: |
        echo "Buscando archivos 7Z y reporte JSON generados..."
        if ls *.7z 1> /dev/null 2>&1; then
          MAIN_FILE=$(ls -1 *.7z | head -1)
          echo "FILES_FOUND=true" >> $GITHUB_OUTPUT
          echo "MAIN_FILE=$MAIN_FILE" >> $GITHUB_OUTPUT
        else
          echo "FILES_FOUND=false" >> $GITHUB_OUTPUT
        fi
        
        # Buscar reporte JSON
        if [ -d "procesados" ]; then
          REPORT_FILE=$(find procesados -name "reporte_procesamiento_*.json" -type f | sort -r | head -1)
          if [ -n "$REPORT_FILE" ]; then
            echo "REPORT_FOUND=true" >> $GITHUB_OUTPUT
            echo "REPORT_FILE=$REPORT_FILE" >> $GITHUB_OUTPUT
            echo "📊 Reporte JSON encontrado: $REPORT_FILE"
            # Mostrar resumen del reporte
            python3 << 'EOF'
import json
import sys
try:
    with open('$REPORT_FILE', 'r', encoding='utf-8') as f:
        data = json.load(f)
        resumen = data.get('resumen', {})
        print('✅ Resumen del procesamiento:')
        print(f'   Total archivos: {resumen.get("total_archivos_procesados", 0)}')
        print(f'   🏛️ Poderes obtenidos: {resumen.get("cantidad_poderes_obtenidos", 0)}')
        print(f'   📋 Solicitudes: {resumen.get("organizacion", {}).get("solicitudes_apudacta", {}).get("cantidad", 0)}')
except Exception as e:
    print(f"Error procesando JSON: {e}")
EOF
          else
            echo "REPORT_FOUND=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "REPORT_FOUND=false" >> $GITHUB_OUTPUT
        fi

    - name: Send to Webhook
      if: steps.check_files.outputs.FILES_FOUND == 'true'
      run: |
        MAIN_FILE="${{ steps.check_files.outputs.MAIN_FILE }}"
        REPORT_FILE="${{ steps.check_files.outputs.REPORT_FILE }}"
        echo "Enviando datos a producción..."
        echo "📦 Archivo 7Z: $MAIN_FILE"
        
        # Enviar archivo 7Z
        echo "Enviando archivo $MAIN_FILE..."
        curl -F "file=@$MAIN_FILE" -F "source=ApudActa-PDF" https://justiflow.com/webhook/poderes
        
        # Enviar JSON de reporte si existe
        if [ -f "$REPORT_FILE" ] && [ "${{ steps.check_files.outputs.REPORT_FOUND }}" == "true" ]; then
          echo "📊 Enviando reporte JSON..."
          # Leer el JSON y enviarlo como data
          RESUMEN=$(python3 << 'PYSCRIPT'
import json
try:
    f = open('$REPORT_FILE')
    d = json.load(f)
    print(json.dumps(d.get('resumen', {})))
    f.close()
except Exception as e:
    print(json.dumps({"error": str(e)}))
PYSCRIPT
)
          if [ -n "$RESUMEN" ]; then
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"source\": \"ApudActa-Scraper\", \"resumen\": $RESUMEN}" \
              https://justiflow.com/webhook/poderes/resumen || echo "⚠️ Error enviando resumen JSON"
          fi
        else
          echo "⚠️ No se encontró reporte JSON para enviar"
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apudacta-processed-files
        path: |
          "*.7z"
          "poderes.zip"
        retention-days: 7
      continue-on-error: true

    - name: Create Success Issue
      if: steps.check_files.outputs.FILES_FOUND == 'true'
      run: |
        gh issue create --title "ApudActa Success $(date +%Y-%m-%d)" --body "Proceso completado exitosamente - Archivos enviados" --label "success"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Error Issue
      if: failure()
      run: |
        gh issue create --title "ApudActa Error $(date +%Y-%m-%d)" --body "Error en el proceso" --label "error"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
