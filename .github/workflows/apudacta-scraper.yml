name: ApudActa Scraper with PDF Processing

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'start_scraper.txt'

jobs:
  scrape_process_and_send:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev libmupdf-dev libfreetype6-dev libjpeg-dev libopenjp2-7-dev

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -c "import fitz; print('PyMuPDF instalado correctamente:', fitz.version)"

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Run ApudActa Scraper
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        echo "Iniciando ApudActa Scraper con procesamiento PDF..."
        mkdir -p descargas
        timeout 25m python easyday.py || exit 1

    - name: Check Downloaded Files
      id: check_files
      run: |
        echo "Buscando archivos 7Z generados..."
        if ls *.7z 1> /dev/null 2>&1; then
          MAIN_FILE=$(ls -1 *.7z | head -1)
          echo "FILES_FOUND=true" >> $GITHUB_OUTPUT
          echo "MAIN_FILE=$MAIN_FILE" >> $GITHUB_OUTPUT
        else
          echo "FILES_FOUND=false" >> $GITHUB_OUTPUT
        fi

    - name: Send to Webhook
      if: steps.check_files.outputs.FILES_FOUND == 'true'
      run: |
        MAIN_FILE="${{ steps.check_files.outputs.MAIN_FILE }}"
        curl -F "file=@$MAIN_FILE" -F "source=ApudActa-PDF" https://hook.eu2.make.com/40abzk3u54x8rpcg8g7r68pfrkmegb4r
        curl -F "file=@$MAIN_FILE" -F "source=ApudActa-PDF" https://hook.eu2.make.com/1cslr0tdf4bl70bdtfx9edjmrxmz7xn8

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apudacta-processed-files
        path: "*.7z"
        retention-days: 7
      continue-on-error: true

    - name: Create Success Issue
      if: steps.check_files.outputs.FILES_FOUND == 'true'
      run: |
        gh issue create --title "ApudActa Success $(date +%Y-%m-%d)" --body "Proceso completado exitosamente" --label "success"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Error Issue
      if: failure()
      run: |
        gh issue create --title "ApudActa Error $(date +%Y-%m-%d)" --body "Error en el proceso" --label "error"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
