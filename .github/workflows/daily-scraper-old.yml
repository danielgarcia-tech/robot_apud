name: Daily ApudActa Scraper

on:
  schedule:
    # Ejecutar todos los días a las 6:00 AM UTC (7:00 AM Madrid en invierno, 8:00 AM en verano)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Permite ejecución manual desde GitHub

# 🔐 CONFIGURACIÓN DE SEGURIDAD
env:
  FORCE_COLOR: 1  # Colores en logs

jobs:
  scrape-apudacta:
    runs-on: ubuntu-latest

    # 🛡️ PERMISOS PARA CREAR ISSUES
    permissions:
      contents: read  # Solo leer código
      actions: read   # Leer actions
      issues: write   # ✅ PERMISO PARA CREAR ISSUES

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        # Necesario para usar gh CLI con permisos
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright python-dotenv py7zr

    - name: 🌐 Install Playwright browsers
      run: |
        playwright install chromium

    - name: 🚀 Run ApudActa Scraper
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        echo "🌟 Iniciando scraper diario..."
        echo "📧 Usuario: $EMAIL"
        echo "🔐 Password: [PROTEGIDO]"
        python easyday.py
        echo "✅ Scraper completado"

    - name: 📁 Upload downloaded files
      uses: actions/upload-artifact@v4
      if: always()  # Subir archivos aunque haya errores
      with:
        name: apudacta-downloads-${{ github.run_number }}
        path: descargas/
        retention-days: 7  # ⚠️ SOLO 7 DÍAS para seguridad

    - name: 📧 Send daily ZIP to Daniel
      if: success()  # Solo enviar si la descarga fue exitosa
      run: |
        # Crear Issue automáticamente para notificar sobre archivos descargados
        ISSUE_TITLE="📦 ApudActa - Archivo diario $(date +%Y-%m-%d)"
        ISSUE_BODY="## ✅ Scraper ejecutado exitosamente

### 📊 Detalles de la descarga:
- **Fecha:** $(date +%Y-%m-%d)
- **Hora:** $(date +%H:%M) UTC
- **Archivos encontrados:** $(ls descargas/ | wc -l)

### 📁 Archivos descargados:
$(for file in descargas/*; do
  if [ -f "$file" ]; then
    echo "- $(basename "$file") ($(du -h "$file" | cut -f1))"
  fi
done)

### 🔐 SEGURIDAD DEL ARCHIVO
- Los archivos están protegidos con contraseña
- **Contraseña:** Rua2025

### � Descargar archivos
Los archivos están disponibles en la sección **Artifacts** de esta ejecución:
- Nombre del artifact: \`apudacta-downloads-${{ github.run_number }}\`
- Link: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

---
🤖 *Robot ApudActa - Notificación automática*"

        # Crear el issue usando GitHub CLI
        echo "$ISSUE_BODY" | gh issue create --title "$ISSUE_TITLE" --body-file - --label "scraper-notification"

    - name: 🧹 Cleanup sensitive data
      if: always()
      run: |
        # Limpiar cualquier dato sensible de logs
        echo "🧹 Limpiando datos sensibles..."
        rm -rf descargas/  # Eliminar archivos locales después de subir

    - name: 📧 Send notification when no files found
      if: success() && !hashFiles('descargas/*.7z')
      run: |
        # Crear Issue automáticamente cuando no hay archivos
        ISSUE_TITLE="⚠️ ApudActa - No se encontraron archivos $(date +%Y-%m-%d)"
        ISSUE_BODY="## ℹ️ Scraper ejecutado - Sin archivos nuevos

El scraper se ejecutó correctamente pero no encontró archivos para descargar.

### 🤔 Posibles razones:
- No hay nuevos archivos finalizados en ApudActa
- Todos los archivos ya fueron descargados anteriormente
- Problema temporal en la plataforma

### 📅 Información de ejecución:
- **Fecha:** $(date +%Y-%m-%d)
- **Hora:** $(date +%H:%M) UTC

El scraper seguirá funcionando normalmente y te notificará cuando haya archivos disponibles.

---
🤖 *Robot ApudActa - Notificación automática*"

        # Crear el issue usando GitHub CLI
        echo "$ISSUE_BODY" | gh issue create --title "$ISSUE_TITLE" --body-file - --label "scraper-notification,no-files"

    - name: 📧 Send notification on failure
      if: failure()
      run: |
        # Crear Issue automáticamente cuando hay error
        ISSUE_TITLE="❌ Error en ApudActa Scraper - ${{ github.run_number }}"
        ISSUE_BODY="## 🚨 Error en ejecución del scraper

Ha ocurrido un error en la ejecución del scraper de ApudActa.

### 📋 Detalles del error:
- **Fecha:** $(date +%Y-%m-%d)
- **Hora:** $(date +%H:%M) UTC
- **Run ID:** ${{ github.run_id }}

### 🔍 Posibles causas:
- Problemas de conexión con ApudActa
- Cambios en la interfaz web
- Credenciales expiradas
- Problemas temporales de red

### 📖 Revisar logs completos:
https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

### ⏰ Próxima ejecución:
El scraper intentará ejecutarse nuevamente mañana a las 6:00 AM UTC.

---
🤖 *Robot ApudActa - Notificación de error*"

        # Crear el issue usando GitHub CLI
        echo "$ISSUE_BODY" | gh issue create --title "$ISSUE_TITLE" --body-file - --label "scraper-notification,error"
